[project]
name = "isee-workbench"
version = "0.1.0"
description = "Backend for iSee Data Analysis Workbench"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.29.0",
    "sqlalchemy>=2.0.0",
    "psycopg2-binary>=2.9.9",
    "pydantic>=2.6.0",
    "pydantic-settings>=2.2.0",
    "pandas>=2.2.0",
    "python-multipart>=0.0.9",
    "apscheduler>=3.10.0",
    "openpyxl>=3.1.0",
    "httpx>=0.27.0",
    "cryptography>=43.0.0",
    "sqlglot>=25.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
    "mypy>=1.9.0",
    "ruff>=0.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.per-file-ignores]
# Dev/seed scripts: keep format/structure flexible, don't enforce line length or import order
"scripts/**" = ["E501", "E701", "I001", "W291", "W292", "F401", "F541", "F841"]
# Alembic migrations: env.py is hand-written, versions/ is autogenerated — don't enforce structure
"alembic/**" = ["E501", "E701", "I001", "W291", "W292", "F401", "F541", "F841"]

[tool.mypy]
python_version = "3.11"
strict = true
explicit_package_bases = true
warn_return_any = true
warn_unused_configs = true
plugins = ["sqlalchemy.ext.mypy.plugin"]

[[tool.mypy.overrides]]
module = "apscheduler.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
filterwarnings = [
    # Starlette deprecation: httpx → httpx2. Cannot resolve at project level;
    # depends on upstream starlette releasing httpx2-compatible testclient.
    "ignore:Using `httpx` with `starlette.testclient` is deprecated:starlette.exceptions.StarletteDeprecationWarning",
    "ignore:'HTTP_422_UNPROCESSABLE_ENTITY' is deprecated:starlette.exceptions.StarletteDeprecationWarning",
]
